<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NeoQC — 3-page report dev harness</title>
<!--
  Dev-only harness: renders the REAL print report (markup fetched live from
  index.html, styled by the real print-report.css, populated by the real
  print-render.js) on screen with a fully-loaded mock ticket, so the report
  can be iterated without launching Electron or printing. Not shipped to
  customers; not referenced by the app.
-->
<link rel="stylesheet" href="print-report.css">
<style>
  body { background: #666; margin: 0; padding: 20px; font-family: sans-serif; }
  /* Emulate A4 sheets on screen */
  #print-report-container { display: block !important; }
  #print-report-container .print-page {
    background: #fff;
    width: 210mm;
    min-height: 296mm;
    margin: 0 auto 18px auto;
    padding: 9mm 10mm;
    box-shadow: 0 3px 14px rgba(0,0,0,0.4);
  }
  .harness-note { color: #eee; text-align: center; font-size: 12px; margin-bottom: 14px; }
</style>
</head>
<body>
<div class="harness-note">NeoQC report harness — real markup from index.html + real print-render.js + mock ticket. Each white sheet = one printed A4 page.</div>
<div id="mount">loading…</div>

<script src="print-render.js"></script>

    const container = doc.getElementById('print-report-container');

</body>
</html>
