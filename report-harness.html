  customers; not referenced by the app.
-->
<link rel="stylesheet" href="print-report.css">
<style>
  body { background: #666; margin: 0; padding: 20px; font-family: sans-serif; }
  /* Emulate A4 sheets on screen */
  #print-report-container { display: block !important; }
  #print-report-container .print-page {
    background: #fff;
    width: 210mm;
    min-height: 296mm;
    margin: 0 auto 18px auto;
    padding: 9mm 10mm;
    box-shadow: 0 3px 14px rgba(0,0,0,0.4);
  }
  .harness-note { color: #eee; text-align: center; font-size: 12px; margin-bottom: 14px; }
</style>
</head>

// Use fetch with an ABSOLUTE URL so this also works when opened via file:// —
// otherwise fetch('index.html') fails with "Failed to parse URL from
// index.html" because relative URLs can't resolve against a file: origin.
const indexUrl = new URL('index.html', document.baseURI).href;
fetch(indexUrl)
  .then(r => r.text())
  .then(html => {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const container = doc.getElementById('print-report-container');
    if (!container) throw new Error('print-report-container not found in index.html');
    document.getElementById('mount').replaceWith(container);
    window.NeoQcPrintRender.populate(MOCK_TICKET, MOCK_SETTINGS, MOCK_PPI);
    document.title = 'harness-ready';
  })
  .catch(e => {
    document.getElementById('mount').textContent = 'HARNESS ERROR: ' + e.message +
      '\n\nTip: this file uses fetch() to load the report markup — if you opened it directly (file://), your browser may block that. Serve the repo folder over http and open http://localhost:PORT/report-harness.html.';
    document.title = 'harness-error';
